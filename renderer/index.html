<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AutoClicker</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="app">
            <section class="hero">
                <div>
                    <p class="eyebrow">AutoClicker</p>
                    <h1>Макросы и горячие клавиши</h1>
                    <p>
                        Настройка, запись, импорт/экспорт и безопасный запуск
                        макросов.
                    </p>
                </div>
                <div class="actions-bar">
                    <button id="restartBackend" class="secondary">
                        Перезапустить backend
                    </button>
                    <button id="newMacro" class="primary">Новый макрос</button>
                </div>
            </section>

            <section class="layout">
                <aside class="panel">
                    <h2>Макросы</h2>
                    <div id="macroList" class="macro-list"></div>
                    <div class="actions-bar stacked">
                        <button id="exportSelected" type="button">
                            Экспорт выбранного
                        </button>
                        <button id="exportAll" type="button">
                            Экспорт всех
                        </button>
                        <label class="file-button"
                            >Импорт JSON<input
                                id="importMacros"
                                type="file"
                                accept="application/json,.json"
                        /></label>
                        <button id="resetDemo" class="danger" type="button">
                            Сбросить демо
                        </button>
                    </div>
                </aside>

                <section class="panel editor">
                    <h2>Редактор</h2>
                    <form id="macroForm">
                        <input type="hidden" id="macroId" />
                        <label
                            >Название<input
                                id="name"
                                required
                                placeholder="Фарм ресурсов"
                        /></label>
                        <label
                            >Горячая клавиша<input
                                id="hotkey"
                                placeholder="ctrl+alt+1"
                        /></label>
                        <div class="row">
                            <label
                                >Повторы<input
                                    id="repeat"
                                    type="number"
                                    min="1"
                                    value="1"
                            /></label>
                            <label
                                >Пауза между повторами, мс<input
                                    id="intervalMs"
                                    type="number"
                                    min="0"
                                    value="100"
                            /></label>
                        </div>
                        <section class="action-editor">
                            <div class="section-header">
                                <div>
                                    <h3>Действия</h3>
                                    <p class="hint">
                                        Перетаскивайте действия, дублируйте и
                                        редактируйте параметры без ручного JSON.
                                    </p>
                                </div>
                                <button id="addAction" type="button">
                                    Добавить действие
                                </button>
                            </div>
                            <div id="actionsList" class="actions-list"></div>
                            <details>
                                <summary>Предпросмотр JSON</summary>
                                <textarea
                                    id="actionsPreview"
                                    rows="8"
                                    spellcheck="false"
                                ></textarea>
                            </details>
                        </section>
                        <div class="actions-bar">
                            <button type="submit">Сохранить</button>
                            <button id="runMacro" class="primary" type="button">
                                Запустить
                            </button>
                            <button
                                id="stopMacro"
                                class="secondary"
                                type="button"
                            >
                                Остановить
                            </button>
                            <button id="stopAll" class="danger" type="button">
                                Остановить всё
                            </button>
                            <button
                                id="recordMacro"
                                class="secondary"
                                type="button"
                            >
                                Записать
                            </button>
                            <button
                                id="deleteMacro"
                                class="danger"
                                type="button"
                            >
                                Удалить
                            </button>
                        </div>
                    </form>
                    <pre id="status">Запуск...</pre>
                </section>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
